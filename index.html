<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรับ-จ่าย ร้านขายของชำ</title>
    <!-- นำเข้าฟอนต์ภาษาไทย Sarabun จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS ตกแต่ง UI ให้สวยงามและทันสมัย */
        :root {
            --primary-color: #10b981; /* สีเขียวหลัก */
            --primary-hover: #059669; /* สีเขียวเมื่อเอาเมาส์ชี้ */
            --bg-color: #f0fdf4; /* สีพื้นหลังเว็บ */
            --card-bg: #ffffff; /* สีพื้นหลังการ์ด */
            --text-main: #1f2937; /* สีข้อความหลัก */
            --text-muted: #6b7280; /* สีข้อความรอง */
            --border-color: #d1d5db; /* สีเส้นขอบ */
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            margin: 0;
            color: var(--primary-hover);
            font-size: 24px;
            font-weight: 700;
        }

        .header p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 15px;
        }

        /* ตกแต่งช่องกรอกข้อมูลและตัวเลือก */
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Sarabun', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        /* ตกแต่งปุ่ม Radio สำหรับเลือกรายรับ/รายจ่าย */
        .radio-group {
            display: flex;
            gap: 15px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input[type="radio"] {
            display: none;
        }

        .radio-option label {
            display: block;
            text-align: center;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .radio-option input[type="radio"]:checked + label {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* ปุ่ม Submit */
        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-family: 'Sarabun', sans-serif;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .submit-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        /* กล่องแสดงข้อความแจ้งเตือน */
        #alertMessage {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none; /* ซ่อนไว้ก่อน */
        }
        
        .alert-success { background-color: #d1fae5; color: #065f46; }
        .alert-error { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header">
            <h2>🛒 บันทึกรับ-จ่าย</h2>
            <p>ระบบจัดการการเงิน ร้านขายของชำ</p>
        </div>

        <form id="storeForm">
            <!-- 1. ประเภทรายการ (ใช้ Radio Button เพื่อความสวยงามและกดง่าย) -->
            <div class="form-group">
                <label>ประเภทรายการ</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="typeIn" name="type" value="รายรับ" required checked>
                        <label for="typeIn">รายรับ 📈</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="typeOut" name="type" value="รายจ่าย" required>
                        <label for="typeOut">รายจ่าย 📉</label>
                    </div>
                </div>
            </div>

            <!-- 2. หมวดหมู่ -->
            <div class="form-group">
                <label for="category">หมวดหมู่</label>
                <select id="category" name="category" required>
                    <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
                    <option value="ขายสินค้าหน้าร้าน">ขายสินค้าหน้าร้าน (รายรับ)</option>
                    <option value="ซื้อของเข้าร้าน">ซื้อของเข้าร้าน (รายจ่าย)</option>
                    <option value="ค่าน้ำ/ค่าไฟ">ค่าน้ำ/ค่าไฟ (รายจ่าย)</option>
                    <option value="ค่าจ้างพนักงาน">ค่าจ้างพนักงาน (รายจ่าย)</option>
                    <option value="เบ็ดเตล็ด">เบ็ดเตล็ด</option>
                </select>
            </div>

            <!-- 3. รายละเอียด -->
            <div class="form-group">
                <label for="description">รายละเอียด</label>
                <input type="text" id="description" name="description" placeholder="เช่น น้ำดื่ม, บิลแม็คโคร, ค่าไฟเดือนนี้" required>
            </div>

            <!-- 4. จำนวนเงิน -->
            <div class="form-group">
                <label for="amount">จำนวนเงิน (บาท)</label>
                <input type="number" id="amount" name="amount" min="0" step="0.25" placeholder="0.00" required>
            </div>

            <!-- 5. วิธีการชำระเงิน -->
            <div class="form-group">
                <label for="paymentMethod">วิธีชำระเงิน</label>
                <select id="paymentMethod" name="paymentMethod" required>
                    <option value="เงินสด">💵 เงินสด</option>
                    <option value="โอนเงิน/สแกน QR">📱 โอนเงิน / สแกน QR</option>
                </select>
            </div>

            <!-- 6. ชื่อผู้บันทึก -->
            <div class="form-group">
                <label for="recordedBy">ชื่อผู้บันทึก (พนักงาน)</label>
                <input type="text" id="recordedBy" name="recordedBy" placeholder="กรอกชื่อพนักงาน" required>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">บันทึกข้อมูล</button>
        </form>

        <!-- พื้นที่แสดงข้อความเมื่อบันทึกสำเร็จ/ล้มเหลว -->
        <div id="alertMessage"></div>
    </div>

    <script>
        // ==========================================
        // 📌 ตั้งค่า URL ของ Google Apps Script ที่นี่
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1AShQDnX1axerUyjZcg43KW5bB934Usxn9zJqjW9lGZYQPMIO_3YzgGYFeAdc9zSWeA/exec";
        
        const form = document.getElementById('storeForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertMessage');

        form.addEventListener('submit', (e) => {
            e.preventDefault(); // ป้องกันหน้าเว็บกระพริบโหลดใหม่

            // ตรวจสอบว่าใส่ URL หรือยัง
            if (SCRIPT_URL === "วาง_URL_ของ_GOOGLE_APPS_SCRIPT ที่นี่" || SCRIPT_URL === "") {
                showAlert("กรุณาใส่ SCRIPT_URL ในโค้ดก่อนครับ!", "error");
                return;
            }

            // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
            submitBtn.disabled = true;
            submitBtn.innerHTML = "กำลังบันทึกข้อมูล... ⏳";
            alertBox.style.display = "none"; // ซ่อนกล่องแจ้งเตือนเก่า

            // ดึงข้อมูลทั้งหมดจากฟอร์ม
            let requestBody = new FormData(form);

            // ส่งข้อมูลไปยัง Google Apps Script
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: requestBody 
            })
            .then(response => {
                // บันทึกสำเร็จ
                showAlert("✅ บันทึกข้อมูลเรียบร้อยแล้ว!", "success");
                form.reset(); // ล้างฟอร์ม
            })
            .catch(error => {
                // เกิดข้อผิดพลาด
                showAlert("❌ เกิดข้อผิดพลาด ไม่สามารถบันทึกได้", "error");
                console.error('Error!', error.message);
            })
            .finally(() => {
                // คืนค่าปุ่มกลับมาเหมือนเดิม
                submitBtn.disabled = false;
                submitBtn.innerHTML = "บันทึกข้อมูล";
            });
        });

        // ฟังก์ชันสำหรับแสดงข้อความแจ้งเตือน
        function showAlert(message, type) {
            alertBox.innerHTML = message;
            alertBox.className = type === "success" ? "alert-success" : "alert-error";
            alertBox.style.display = "block";
            
            // ให้กล่องแจ้งเตือนหายไปเองหลังผ่านไป 5 วินาที
            if (type === "success") {
                setTimeout(() => {
                    alertBox.style.display = "none";
                }, 5000);
            }
        }
    </script>
</body>
</html>
