<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Smart Home Controller</title>
    <style>
        /* CSS ตกแต่งหน้าเว็บ (Dark Theme สไตล์ IoT) */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            color: #58a6ff;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            flex: 1; /* ช่วยดัน footer ให้ไปอยู่ด้านล่างสุดหากเนื้อหาน้อย */
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .channel-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffffff;
        }
        /* ตกแต่งปุ่ม Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #484f58;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px; width: 26px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #238636; /* สีเขียวเมื่อเปิดใช้งาน */
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /*ส่วนตกแต่งเครดิตผู้พัฒนาระบบด้านล่างสุด*/
        footer {
            margin-top: 3rem;
            padding: 1.5rem 0;
            width: 100%;
            max-width: 800px;
            text-align: center;
            border-top: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        footer .highlight {
            color: #58a6ff;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <h1>IoT Smart Home Controller</h1>

    <div class="grid-container">
        <div class="card">
            <div class="icon">💡</div>
            <div class="channel-name">CH1: Light 1</div>
            <label class="switch">
                <input type="checkbox" id="ch1">
                <span class="slider"></span>
            </label>
        </div>

        <div class="card">
            <div class="icon">🌀</div>
            <div class="channel-name">CH2: Fan</div>
            <label class="switch">
                <input type="checkbox" id="ch2">
                <span class="slider"></span>
            </label>
        </div>

        <div class="card">
            <div class="icon">📺</div>
            <div class="channel-name">CH3: TV</div>
            <label class="switch">
                <input type="checkbox" id="ch3">
                <span class="slider"></span>
            </label>
        </div>

        <div class="card">
            <div class="icon">🔌</div>
            <div class="channel-name">CH4: Plug</div>
            <label class="switch">
                <input type="checkbox" id="ch4">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <footer>
        ผู้พัฒนาระบบ: <span class="highlight">ครูวิทยากร วรรณา</span> | แผนกอิเล็กทรอนิกส์ วิทยาลัยสารพัดช่างศรีสะเกษ
    </footer>

    <script type="module">
        // 1. Import ฟังก์ชันที่จำเป็นจาก Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // 2. ตั้งค่า Firebase Config ของคุณ (!!! ต้องนำค่าจาก Project ของคุณมาใส่แทนที่ !!!)
        const firebaseConfig = {
           apiKey: "AIzaSyCvhzRKZg6pqhO_uqmjDxhX4EpJ2XJByPs",
  authDomain: "myiot2026-473f5.firebaseapp.com",
  databaseURL: "https://myiot2026-473f5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "myiot2026-473f5",
  storageBucket: "myiot2026-473f5.firebasestorage.app",
  messagingSenderId: "798810389806",
  appId: "1:798810389806:web:92fd9366fbe53b066fcebf",
  measurementId: "G-F29GZY6315"
};

        // 3. เริ่มต้นระบบ Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // รายชื่อ ID ของสวิตช์ใน HTML
        const channels = ['ch1', 'ch2', 'ch3', 'ch4'];

        // 4. สร้างฟังก์ชันสำหรับฟังการเปลี่ยนแปลงจาก Firebase (รับข้อมูลมาแสดงที่ UI)
        const devicesRef = ref(database, 'SmartHome/Devices');
        
        onValue(devicesRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                channels.forEach(ch => {
                    if(data[ch] !== undefined) {
                        document.getElementById(ch).checked = data[ch];
                    }
                });
            }
        });

        // 5. สร้าง Event Listener เมื่อผู้ใช้กดคลิกสวิตช์บนเว็บ ให้ส่งค่าไปยัง Firebase
        channels.forEach(ch => {
            const toggleSwitch = document.getElementById(ch);
            toggleSwitch.addEventListener('change', (event) => {
                const status = event.target.checked;
                set(ref(database, 'SmartHome/Devices/' + ch), status)
                    .then(() => {
                        console.log(`${ch} is now ${status ? 'ON' : 'OFF'}`);
                    })
                    .catch((error) => {
                        console.error("Error updating database: ", error);
                        event.target.checked = !status; 
                        alert("เกิดข้อผิดพลาดในการเชื่อมต่อ Firebase");
                    });
            });
        });
    </script>
</body>
</html>
